name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for manual build (e.g. v0.2.0). Leave empty to only run release-please."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ── Release Please — creates/updates the release PR ────────────────────────
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || inputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Build standalone binary (per platform) ─────────────────────────────────
  build-binary:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dcc-mcp-photoshop-windows
            binary: dist/binary/dcc-mcp-photoshop.exe
          - os: ubuntu-latest
            artifact: dcc-mcp-photoshop-linux
            binary: dist/binary/dcc-mcp-photoshop
          - os: macos-latest
            artifact: dcc-mcp-photoshop-macos
            binary: dist/binary/dcc-mcp-photoshop
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" pyinstaller

      - name: Build standalone binary
        run: python tools/build_binary.py

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}


    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Run tests
        run: |
          pip install ".[dev]"
          pytest tests/ -v --tb=short

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Build UXP plugin .ccx ───────────────────────────────────────────────────
  build-uxp-plugin:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Pack UXP plugin (.ccx)
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ inputs.tag_name }}"
            VERSION="${VERSION#v}"
          fi
          python tools/pack_plugin.py --version "$VERSION" --output dist/plugin
        shell: bash

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: uxp-plugin
          path: dist/plugin/*.ccx

  # ── Publish to PyPI ─────────────────────────────────────────────────────────
  publish:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-photoshop
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true

  # ── Attach wheels + plugin + binaries to GitHub Release ─────────────────────
  attach-release-assets:
    needs: [release-please, publish, build-uxp-plugin, build-binary]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download UXP plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: uxp-plugin
          path: dist/plugin/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: dcc-mcp-photoshop-windows
          path: dist/binary/windows/

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: dcc-mcp-photoshop-linux
          path: dist/binary/linux/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: dcc-mcp-photoshop-macos
          path: dist/binary/macos/

      - name: Rename binaries with platform suffix
        run: |
          mv dist/binary/windows/dcc-mcp-photoshop.exe  dist/binary/dcc-mcp-photoshop-windows.exe  || true
          mv dist/binary/linux/dcc-mcp-photoshop        dist/binary/dcc-mcp-photoshop-linux         || true
          mv dist/binary/macos/dcc-mcp-photoshop        dist/binary/dcc-mcp-photoshop-macos         || true

      - name: Attach all assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/plugin/*.ccx
            dist/binary/dcc-mcp-photoshop-*.exe
            dist/binary/dcc-mcp-photoshop-linux
            dist/binary/dcc-mcp-photoshop-macos
